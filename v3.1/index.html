<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spinning Wheel Picker</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #ff006e;
            --secondary: #00f5ff;
            --accent: #ffd60a;
            --dark: #1a1a2e;
            --light: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, var(--dark) 0%, #2d3561 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-x: hidden;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 60px;
            max-width: 1400px;
            width: 100%;
            align-items: start;
        }

        @media (max-width: 900px) {
            .container {
                grid-template-columns: 1fr;
                gap: 40px;
            }
        }

        .wheel-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 30px;
        }

        .wheel-container {
            position: relative;
            width: 400px;
            height: 400px;
            max-width: 100%;
        }

        canvas {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 20px 60px rgba(255, 0, 110, 0.3));
        }

        .pointer {
            position: absolute;
            top: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 20px solid transparent;
            border-right: 20px solid transparent;
            border-top: 30px solid var(--primary);
            z-index: 10;
            filter: drop-shadow(0 4px 8px rgba(0, 0, 0, 0.3));
        }

        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            width: 100%;
        }

        button {
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .spin-btn {
            background: linear-gradient(135deg, var(--primary), #ff0080);
            color: white;
            padding: 16px 48px;
            font-size: 18px;
            min-width: 200px;
        }

        .spin-btn:hover:not(:disabled) {
            transform: scale(1.05);
            box-shadow: 0 10px 30px rgba(255, 0, 110, 0.4);
        }

        .spin-btn:active:not(:disabled) {
            transform: scale(0.98);
        }

        .spin-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .result {
            text-align: center;
            margin-top: 20px;
            min-height: 80px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .result-label {
            color: var(--secondary);
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .result-text {
            color: white;
            font-size: 32px;
            font-weight: 700;
            animation: slideIn 0.6s ease;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .input-section {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .input-section h2 {
            color: white;
            font-size: 24px;
            margin-bottom: 10px;
            font-weight: 700;
        }

        .input-section p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 30px;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            color: var(--secondary);
            font-size: 14px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        input[type="text"] {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid rgba(0, 245, 255, 0.3);
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-size: 16px;
            transition: all 0.3s ease;
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--secondary);
            background: rgba(0, 245, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.2);
        }

        .add-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--secondary), #00d9ff);
            color: var(--dark);
            font-weight: 700;
        }

        .add-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(0, 245, 255, 0.3);
        }

        .items-list {
            margin-top: 30px;
        }

        .items-list h3 {
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            opacity: 0.9;
        }

        .items-count {
            display: inline-block;
            background: var(--primary);
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 8px;
            font-weight: 700;
        }

        .item {
            background: rgba(255, 255, 255, 0.08);
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            animation: itemSlideIn 0.4s ease;
        }

        @keyframes itemSlideIn {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        .item:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .item-text {
            color: white;
            flex: 1;
        }

        .item-color {
            width: 20px;
            height: 20px;
            border-radius: 50%;
            margin-right: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .delete-btn {
            background: rgba(255, 0, 110, 0.7);
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.2s ease;
            font-weight: 600;
        }

        .delete-btn:hover {
            background: var(--primary);
            transform: scale(1.05);
        }

        .empty-state {
            color: rgba(255, 255, 255, 0.5);
            text-align: center;
            padding: 20px;
            font-style: italic;
        }

        .reset-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            color: var(--secondary);
            margin-top: 20px;
            border: 1px solid var(--secondary);
        }

        .reset-btn:hover {
            background: rgba(0, 245, 255, 0.1);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="wheel-section">
            <div class="wheel-container">
                <div class="pointer"></div>
                <canvas id="wheelCanvas"></canvas>
            </div>
            <div class="controls">
                <button class="spin-btn" id="spinBtn">SPIN!</button>
            </div>
            <div class="result">
                <div class="result-label" id="resultLabel"></div>
                <div class="result-text" id="resultText"></div>
            </div>
        </div>

        <div class="input-section">
            <h2>Your Choices</h2>
            <p>Add items and spin to decide!</p>
            
            <form id="addForm">
                <div class="form-group">
                    <label for="itemInput">Add new choice</label>
                    <input 
                        type="text" 
                        id="itemInput" 
                        placeholder="Enter a choice..." 
                        required
                        autocomplete="off"
                    >
                </div>
                <button type="submit" class="add-btn">Add Choice</button>
            </form>

            <div class="items-list">
                <h3>
                    Choices
                    <span class="items-count" id="itemCount">0</span>
                </h3>
                <div id="itemsList" class="empty-state">No choices yet. Add one to start!</div>
            </div>

            <button class="reset-btn" id="resetBtn">Reset All</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('wheelCanvas');
        const ctx = canvas.getContext('2d');
        const spinBtn = document.getElementById('spinBtn');
        const resetBtn = document.getElementById('resetBtn');
        const itemInput = document.getElementById('itemInput');
        const addForm = document.getElementById('addForm');
        const itemsList = document.getElementById('itemsList');
        const itemCount = document.getElementById('itemCount');
        const resultText = document.getElementById('resultText');
        const resultLabel = document.getElementById('resultLabel');

        let items = [];
        let isSpinning = false;
        let currentRotation = 0;

        // Color palette
        const colors = [
            '#FF006E', '#FB5607', '#FFBE0B', '#8338EC', '#3A86FF',
            '#06FFA5', '#FF006E', '#FB5607', '#FFBE0B', '#3A86FF',
            '#FF10F0', '#00F5FF', '#FFD60A', '#FF0080', '#06D6A0'
        ];

        // Set canvas size
        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
            drawWheel();
        }

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // Draw the wheel
        function drawWheel() {
            // Clear canvas
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            if (items.length === 0) {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
                ctx.font = '18px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText('Add choices to start', canvas.width / 2, canvas.height / 2);
                return;
            }

            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = Math.min(centerX, centerY) - 10;
            const sliceAngle = (Math.PI * 2) / items.length;

            // Draw segments
            items.forEach((item, index) => {
                const startAngle = index * sliceAngle + currentRotation;
                const endAngle = startAngle + sliceAngle;

                // Draw slice
                ctx.beginPath();
                ctx.moveTo(centerX, centerY);
                ctx.arc(centerX, centerY, radius, startAngle, endAngle);
                ctx.closePath();
                ctx.fillStyle = colors[index % colors.length];
                ctx.fill();

                // Draw border
                ctx.strokeStyle = 'rgba(255, 255, 255, 0.3)';
                ctx.lineWidth = 2;
                ctx.stroke();

                // Draw text
                const textAngle = startAngle + sliceAngle / 2;
                const textX = centerX + Math.cos(textAngle) * (radius * 0.65);
                const textY = centerY + Math.sin(textAngle) * (radius * 0.65);

                ctx.save();
                ctx.translate(textX, textY);
                ctx.rotate(textAngle + Math.PI / 2);
                ctx.fillStyle = 'white';
                ctx.font = 'bold 14px sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                // Truncate long text
                let displayText = item;
                if (displayText.length > 15) {
                    displayText = displayText.substring(0, 12) + '...';
                }
                ctx.fillText(displayText, 0, 0);
                ctx.restore();
            });

            // Draw center circle
            ctx.beginPath();
            ctx.arc(centerX, centerY, 30, 0, Math.PI * 2);
            ctx.fillStyle = '#1a1a2e';
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 245, 255, 0.5)';
            ctx.lineWidth = 3;
            ctx.stroke();
        }

        // Add item
        function addItem(text) {
            if (text.trim().length === 0) return;
            if (items.length >= 12) {
                alert('Maximum 12 choices allowed');
                return;
            }
            
            items.push(text.trim());
            updateItemsList();
            drawWheel();
            itemInput.value = '';
            itemInput.focus();
        }

        // Remove item
        function removeItem(index) {
            items.splice(index, 1);
            currentRotation = 0;
            resultText.textContent = '';
            resultLabel.textContent = '';
            updateItemsList();
            drawWheel();
        }

        // Update items display
        function updateItemsList() {
            itemCount.textContent = items.length;
            
            if (items.length === 0) {
                itemsList.innerHTML = '<div class="empty-state">No choices yet. Add one to start!</div>';
                spinBtn.disabled = true;
                return;
            }

            spinBtn.disabled = false;
            itemsList.innerHTML = items.map((item, index) => `
                <div class="item">
                    <div class="item-color" style="background-color: ${colors[index % colors.length]}"></div>
                    <div class="item-text">${item}</div>
                    <button type="button" class="delete-btn" onclick="removeItem(${index})">Delete</button>
                </div>
            `).join('');
        }

        // Spin the wheel
        function spin() {
            if (isSpinning || items.length === 0) return;

            isSpinning = true;
            spinBtn.disabled = true;
            resultText.textContent = '';
            resultLabel.textContent = '';

            const spinDuration = 4000; // 4 seconds
            const spins = 5; // Number of full rotations
            const finalRotation = Math.random() * (Math.PI * 2);
            const totalRotation = spins * Math.PI * 2 + finalRotation;

            let startTime = Date.now();

            function animate() {
                const elapsed = Date.now() - startTime;
                const progress = Math.min(elapsed / spinDuration, 1);

                // Easing function for a nice deceleration
                const easeProgress = 1 - Math.pow(1 - progress, 3);
                currentRotation = easeProgress * totalRotation;

                drawWheel();

                if (progress < 1) {
                    requestAnimationFrame(animate);
                } else {
                    isSpinning = false;
                    spinBtn.disabled = false;
                    showResult();
                }
            }

            requestAnimationFrame(animate);
        }

        // Show result
        function showResult() {
            const sliceAngle = (Math.PI * 2) / items.length;
            
            // The pointer is at the top (angle 3π/2 in canvas coordinates)
            // Find which segment is under the pointer by subtracting the wheel's rotation
            const pointerAngle = (3 * Math.PI / 2) - currentRotation;
            const normalizedAngle = ((pointerAngle % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
            const selectedIndex = Math.floor(normalizedAngle / sliceAngle) % items.length;

            resultLabel.textContent = '🎉 You got:';
            resultText.textContent = items[selectedIndex];
        }

        // Event listeners
        addForm.addEventListener('submit', (e) => {
            e.preventDefault();
            addItem(itemInput.value);
        });

        spinBtn.addEventListener('click', spin);

        resetBtn.addEventListener('click', () => {
            if (confirm('Clear all choices?')) {
                items = [];
                currentRotation = 0;
                resultText.textContent = '';
                resultLabel.textContent = '';
                updateItemsList();
                drawWheel();
            }
        });

        // Initialize
        updateItemsList();
    </script>
</body>
</html>
